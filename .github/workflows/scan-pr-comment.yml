name: PR Scan Summary & Comment

on:
  workflow_run:
    workflows: ["PR Scan"]
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  summarize-and-comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download raw scan results
        uses: actions/download-artifact@v4
        with:
          name: pr-scan-raw
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run summary generator
        run: |
          chmod +x .github/summary-generator.sh
          .github/summary-generator.sh

      - name: Get PR number
        id: get-pr
        run: |
          PR_NUMBER=$(cat pr-number.txt 2>/dev/null | tr -d '[:space:]')
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: steps.get-pr.outputs.pr_number != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.get-pr.outputs.pr_number }}
          path: summary.md
