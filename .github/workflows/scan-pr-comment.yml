name: PR Scan Summary & Comment

on:
  pull_request_target:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  summarize-and-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Download raw scan results
        uses: actions/download-artifact@v4
        with:
          name: pr-scan-raw

      - name: Run summary generator
        run: |
          chmod +x .github/summary-generator.sh
          .github/summary-generator.sh

      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: summary.md
